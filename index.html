<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body{ 
            background-image: url('https://i.pinimg.com/736x/e1/b1/2f/e1b12fbdd9b91bc21aef49c865241f9e.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
		}
    </style>

</head>
<body>
<!--Log in keme-->
    <div style="margin-top: 170px;">
    <div class="container m-5 p-3 bg-light text-dark rounded-5 w-25 mx-auto border border-warning border-3">

        <form class="d-flex flex-column align-items-center text-center">
            <h2>Login Form <span class="fst-italic">!</span></h2>
            <label for="uname">Username:</label>
                <input type="text" id="uname" class="form-control rounded-5 w-75 mx-auto" placeholder="Enter here..." required>
                <br>

            <label for="pwd">Password:</label>
                <input type="password" id="pwd" class="form-control rounded-5 w-75 mx-auto" placeholder="Enter here..." required>
                <br>

            <div class="text-start w-100">
            <input class="form-check-input" type="checkbox" id="stay">
                <label class="form-check-label">Stay logged in</label>
                <p class="small-text fst-italic text-secondary">(Your session will stay active on this device.)</p>
            </div>

            <p id="display"></p>

            <div class="d-flex justify-content-center gap-2 mt-2">
                <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">
                <input type="button" name="button" id="cancel" value="Cancel" class="btn btn-secondary rounded-5">
            </div>

            <hr class="border-secondary border-1 opacity-75 w-100 mx-auto">

            <a href="#" class="link-info">Forgot username / password?</a>
        </form>

    </div>
    </div>

    <script>
        let attempt_counter = 0;

        function authenticate(){
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";

        while (attempt_counter < 3) {
        if (username === "Marin17kitagawa" && pwd === "myprincess527") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "notebooks.html";

            break; // stop loop
        }

        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }

        }

        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; // disable button
            }
        }
 
    </script>
</body>
</html>
